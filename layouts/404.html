{{ define "main" }}
<main data-pagefind-ignore class="center mv4 content-width ph3">
    <div class="f2 fw6 heading-color heading-font">404</div>
    <p class="lh-copy post-content f4">
        Sorry, but nothing exists here. <br>
        Find something interesting to read from the <a href='{{ "/blog/" | relURL }}'>archive</a>, or use the search above.
        <span id="suggestions"></span>
    </p>
</main>
<script type="module">
  // Turns the broken URL's slug into a search query and shows the top
  // Pagefind matches - e.g. /blog/elfeed-idnex-0-bytes/ suggests the
  // real "elfeed index 0 bytes" post. Absent in `hugo server` dev mode
  // (no /pagefind/ assets yet), where this just fails silently.
  (async () => {
    const slug = document.location.pathname
      .replace(/\/$/, '')
      .split('/')
      .pop() || '';
    const query = slug.replace(/[-_]+/g, ' ').replace(/\.html?$/i, '').trim();
    if (!query) return;

    try {
      const pagefind = await import('{{ "/pagefind/pagefind.js" | relURL }}');
      await pagefind.init();
      const search = await pagefind.search(query);
      if (!search.results.length) return;

      const entries = await Promise.all(
        search.results.slice(0, 5).map((result) => result.data())
      );

      const container = document.getElementById('suggestions');
      const intro = document.createElement('p');
      intro.textContent = 'Are you looking for any of the following posts?';
      container.append(intro);

      const list = document.createElement('ul');
      entries.forEach((entry) => {
        const item = document.createElement('li');
        const link = document.createElement('a');
        link.href = entry.url;
        link.textContent = entry.meta.title;
        item.append(link);
        list.append(item);
      });
      container.append(list);
    } catch (err) {
      // Pagefind assets not present - nothing to suggest.
    }
  })();
</script>
{{ end }}
